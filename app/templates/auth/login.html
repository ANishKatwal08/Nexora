{% extends "base.html" %}
{% set hide_nav = true %}

{% block title %}Log in to Nexora{% endblock %}

{% block content %}
<div class="auth-split">
    <div class="auth-visual" style="background-image: url('{{ url_for('static', filename='img/auth.jpg') }}');">
        <div class="auth-visual-overlay"></div>
        <div class="auth-visual-text">
            <p class="auth-tagline">Learn any skill from people who get it</p>
            <h2 class="auth-visual-heading">Welcome<br>back</h2>
        </div>
    </div>

    <div class="auth-form-side">
        <div class="auth-form-top">
            <a href="{{ url_for('home') }}" class="auth-logo">Nexora</a>
            <span class="auth-top-link">New here? <a href="{{ url_for('auth.register') }}">Sign up</a></span>
        </div>

        <div class="auth-form-main">
            <h1 class="auth-heading">Sign in</h1>

            <form method="POST" action="{{ url_for('auth.login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="field">
                    <input type="text" id="identifier" name="identifier" placeholder="Email, username, or phone" required>
                </div>

                <div class="field field-password">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <button type="button" class="toggle-password" data-target="password" aria-label="Show password">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>

                <button type="submit" class="btn auth-submit">Sign in</button>
            </form>
        </div>

        <div class="auth-form-bottom">
            <span>Copyright 2026 Nexora</span>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
