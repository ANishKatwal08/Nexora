{% extends "base.html" %}

{% block title %}Log in to Nexora{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Log in to your Nexora account.</p>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="field">
                <label for="identifier">Email, username, or phone</label>
                <input type="text" id="identifier" name="identifier" required>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn auth-btn">Log in</button>
        </form>

        <p class="auth-foot">New to Nexora? <a href="{{ url_for('auth.register') }}">Create an account</a></p>
    </div>
</div>
{% endblock %}
