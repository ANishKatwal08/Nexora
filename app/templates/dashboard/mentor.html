{% extends "dash_base.html" %}
{% set active = 'dashboard' %}

{% block title %}Your dashboard{% endblock %}
{% block page_title %}Dashboard{% endblock %}

{% block dash_content %}
<div class="stats-row">
    <div class="card kpi-card">
        <div class="kpi-icon icon-teal"><i class="fa-solid fa-calendar-days"></i></div>
        <div>
            <span class="kpi-label">Sessions hosted</span>
            <span class="kpi-value">0</span>
        </div>
    </div>
    <div class="card kpi-card">
        <div class="kpi-icon icon-pink"><i class="fa-solid fa-bookmark"></i></div>
        <div>
            <span class="kpi-label">Bookings</span>
            <span class="kpi-value">0</span>
        </div>
    </div>
    <div class="card kpi-card">
        <div class="kpi-icon icon-purple"><i class="fa-solid fa-star"></i></div>
        <div>
            <span class="kpi-label">Average rating</span>
            <span class="kpi-value">–</span>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Your sessions</h3>
    </div>
    <p class="dash-empty">You haven't created any sessions yet.</p>
</div>
{% endblock %}
