{% extends "base.html" %}

{% block title %}Mentor dashboard{% endblock %}

{% block content %}
<section class="dash container">
    <div class="dash-head">
        <h1>Welcome back, {{ name }}</h1>
        <p>Manage your sessions and see how your mentees are doing.</p>
    </div>

    <div class="dash-stats">
        <div class="dash-stat">
            <div class="dash-stat-num">0</div>
            <div class="dash-stat-label">Sessions hosted</div>
        </div>
        <div class="dash-stat">
            <div class="dash-stat-num">0</div>
            <div class="dash-stat-label">Bookings</div>
        </div>
        <div class="dash-stat">
            <div class="dash-stat-num">0.0</div>
            <div class="dash-stat-label">Average rating</div>
        </div>
    </div>

    <div class="dash-panel">
        <h2>Your sessions</h2>
        <p class="dash-empty">You have not created any sessions yet.</p>
    </div>
</section>
{% endblock %}
